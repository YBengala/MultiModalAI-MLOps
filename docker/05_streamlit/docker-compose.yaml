services:
    streamlit:
        build:
            context: ../..
            dockerfile: docker/05_streamlit/Dockerfile
        image: rakuten-streamlit:1.52.0-py3.12
        pull_policy: build
        container_name: rakuten_streamlit
        restart: unless-stopped
        ports:
            - "8501:8501"
        env_file: ../../.env
        environment:
            MLFLOW_TRACKING_URI: http://rakuten-mlflow:5000
            INFERENCE_API_URL: http://rakuten_inference:8000
            AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
            AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
            MLFLOW_S3_ENDPOINT_URL: http://rakuten-minio:9000
            RAKUTEN_DB_HOST: rakuten-postgres
            RAKUTEN_DB_PORT: 5432
        volumes:
            - ../../src:/app/src
            - ../../docker/05_streamlit/.streamlit:/app/.streamlit
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 30s
        networks:
            - rakuten_net

networks:
    rakuten_net:
        external: true
